<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00e5ff">
<link rel="manifest" href="./manifest.json">
<title>PriceWatch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body { background: #090c10; color: #e8ecf0; font-family: 'Syne', sans-serif; }
    .card { background: #111620; border: 1px solid #1e2530; border-radius: 16px; }
    .accent { color: #00e5ff; }
    .btn-gradient { background: linear-gradient(90deg, #00e5ff, #7b61ff); color: #000; }
</style>
</head>
<body class="p-4 pb-24">

<header class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-extrabold italic">Price<span class="accent">Watch</span></h1>
    <div id="statusPill" class="text-[10px] bg-green-500/10 text-green-400 px-3 py-1 rounded-full border border-green-500/20">● ONLINE</div>
</header>

<div id="installBanner" class="hidden card p-4 mb-4 border-cyan-500/30 bg-cyan-500/5">
    <div class="flex gap-3 items-center">
        <span class="text-2xl">📲</span>
        <div class="flex-1">
            <h3 class="text-sm font-bold">Instalar Aplicativo</h3>
            <p class="text-xs text-gray-400">Acesse mais rápido da sua tela inicial.</p>
        </div>
        <button onclick="installApp()" class="btn-gradient px-4 py-2 rounded-lg text-xs font-bold">INSTALAR</button>
    </div>
</div>

<div id="notifBanner" class="hidden card p-4 mb-4 border-purple-500/30 bg-purple-500/5">
    <div class="flex gap-3 items-center">
        <span class="text-2xl">🔔</span>
        <div class="flex-1">
            <h3 class="text-sm font-bold">Ativar Alertas</h3>
            <p class="text-xs text-gray-400">Receba avisos quando o preço cair.</p>
        </div>
        <button onclick="requestNotif()" class="bg-purple-600 px-4 py-2 rounded-lg text-xs font-bold">ATIVAR</button>
    </div>
</div>

<div id="productsList" class="space-y-4">
    </div>

<nav class="fixed bottom-0 left-0 right-0 bg-[#090c10]/90 backdrop-blur-lg border-t border-white/5 p-4 flex justify-around">
    <button onclick="showSection('list')" class="flex flex-col items-center gap-1 text-cyan-400">
        <span class="text-xl">📋</span><span class="text-[10px] font-bold">LISTA</span>
    </button>
    <button onclick="showSection('add')" class="flex flex-col items-center gap-1 text-gray-500">
        <span class="text-xl">➕</span><span class="text-[10px] font-bold">NOVO</span>
    </button>
</nav>

<div id="modalAdd" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 p-6 flex items-center">
    <div class="card w-full p-6">
        <h2 class="text-xl font-bold mb-4">Novo Monitoramento</h2>
        <input id="addName" type="text" placeholder="Nome do produto" class="w-full bg-black/40 border border-white/10 p-3 rounded-lg mb-3 outline-none focus:border-cyan-500 transition">
        <input id="addPrice" type="number" placeholder="Preço de Alerta (Ex: 5000)" class="w-full bg-black/40 border border-white/10 p-3 rounded-lg mb-6 outline-none focus:border-cyan-500 transition">
        <div class="flex gap-3">
            <button onclick="showSection('list')" class="flex-1 py-3 text-gray-400 font-bold">CANCELAR</button>
            <button onclick="saveProduct()" class="flex-1 btn-gradient py-3 rounded-lg font-bold">SALVAR</button>
        </div>
    </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('pw_prods') || '[]');
let deferredPrompt;

// Registro do Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(() => console.log("SW OK"));
}

// Captura evento de instalação
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.remove('hidden');
});

async function installApp() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('installBanner').classList.add('hidden');
        deferredPrompt = null;
    }
}

function requestNotif() {
    Notification.requestPermission().then(perm => {
        if (perm === 'granted') {
            document.getElementById('notifBanner').classList.add('hidden');
            alert("✅ Notificações ativadas!");
        }
    });
}

function showSection(type) {
    document.getElementById('modalAdd').classList.toggle('hidden', type !== 'add');
}

function saveProduct() {
    const name = document.getElementById('addName').value;
    const price = document.getElementById('addPrice').value;
    if(!name || !price) return;
    
    products.push({ id: Date.now(), name, alertPrice: parseFloat(price), lastPrice: null });
    localStorage.setItem('pw_prods', JSON.stringify(products));
    document.getElementById('addName').value = '';
    document.getElementById('addPrice').value = '';
    showSection('list');
    render();
}

function render() {
    const container = document.getElementById('productsList');
    if(products.length === 0) {
        container.innerHTML = `<div class="text-center py-20 opacity-30 text-sm">Nenhum produto sendo monitorado</div>`;
        return;
    }
    
    container.innerHTML = products.map(p => `
        <div class="card p-5 relative overflow-hidden">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="font-bold text-lg">${p.name}</h3>
                    <p class="text-[10px] text-gray-500 font-mono tracking-widest">LIMITE: R$ ${p.alertPrice.toLocaleString()}</p>
                </div>
                <button onclick="remove(${p.id})" class="text-gray-600 hover:text-red-500">🗑️</button>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-2xl font-black ${p.lastPrice <= p.alertPrice ? 'text-green-400' : 'text-white'}">
                    ${p.lastPrice ? 'R$ ' + p.lastPrice.toLocaleString() : '---'}
                </span>
                <button onclick="checkPrice(${p.id})" id="btn-${p.id}" class="bg-white/5 border border-white/10 px-4 py-2 rounded-lg text-[10px] font-bold hover:bg-white/10 transition">VERIFICAR AGORA</button>
            </div>
        </div>
    `).join('');
}

async function checkPrice(id) {
    const p = products.find(x => x.id === id);
    const btn = document.getElementById(`btn-${id}`);
    btn.innerText = "⏳...";
    btn.disabled = true;

    try {
        // Usando um proxy diferente para evitar o erro de conexão
        const query = encodeURIComponent(p.name + " preço");
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.google.com.br/search?q=' + query)}&timestamp=${Date.now()}`;
        
        const res = await fetch(proxy);
        const data = await res.json();
        
        // Regex para achar preços R$
        const prices = data.contents.match(/R\$\s?(\d{1,3}(\.\d{3})*,\d{2})/g);
        
        if(prices) {
            const numericPrices = prices.map(val => parseFloat(val.replace(/[R$\s.]/g, '').replace(',', '.')));
            p.lastPrice = Math.min(...numericPrices);
            localStorage.setItem('pw_prods', JSON.stringify(products));
            render();
            if(p.lastPrice <= p.alertPrice) {
                new Notification("🔥 PREÇO BAIXOU!", { body: `${p.name} está custando R$ ${p.lastPrice}` });
            }
        } else {
            alert("Não encontrei o preço. Tente um nome mais específico.");
        }
    } catch (e) {
        alert("Erro de conexão. Verifique sua internet.");
    } finally {
        btn.innerText = "VERIFICAR AGORA";
        btn.disabled = false;
    }
}

function remove(id) {
    products = products.filter(p => p.id !== id);
    localStorage.setItem('pw_prods', JSON.stringify(products));
    render();
}

// Verifica permissão de notificação ao carregar
if(Notification.permission === 'default') document.getElementById('notifBanner').classList.remove('hidden');
render();
</script>
</body>
</html>
